# Martin tile server configuration
# Serves vector tiles from PMTiles basemap + PostGIS geo_places table

# Disable Martin's in-memory tile cache. Transit display matviews are rebuilt
# frequently during development; a warm cache serves pre-rebuild tiles and makes
# it look like changes "didn't take". Tiles are queried live from PostGIS.
cache_size_mb: 0

pmtiles:
  sources:
    basemap: /data/basemap.pmtiles

postgres:
  connection_string: ${DATABASE_URL}

  tables:
    parchment_pois:
      schema: public
      table: geo_places
      srid: 4326
      geometry_column: centroid
      geometry_type: POINT
      id_column: id
      minzoom: 10
      maxzoom: 16
      properties:
        id: id
        name: name
        categories: categories
        geom_type: geom_type
      buffer: 64
      clip_geom: true

    parchment_boundaries:
      schema: public
      table: geo_places
      srid: 4326
      geometry_column: geom
      id_column: id
      minzoom: 4
      maxzoom: 14
      properties:
        id: id
        name: name
        admin_level: admin_level
        geom_type: geom_type
      buffer: 64
      clip_geom: true

    parchment_roads:
      schema: public
      table: geo_places
      srid: 4326
      geometry_column: geom
      id_column: id
      minzoom: 6
      maxzoom: 16
      properties:
        id: id
        name: name
        geom_type: geom_type
      buffer: 64
      clip_geom: true

    parchment_buildings:
      schema: public
      table: geo_places
      srid: 4326
      geometry_column: geom
      id_column: id
      minzoom: 14
      maxzoom: 16
      properties:
        id: id
        name: name
        geom_type: geom_type
      buffer: 64
      clip_geom: true

    parchment_water:
      schema: public
      table: geo_places
      srid: 4326
      geometry_column: geom
      id_column: id
      minzoom: 8
      maxzoom: 16
      properties:
        id: id
        name: name
        geom_type: geom_type
      buffer: 64
      clip_geom: true

    bicycle_ways:
      schema: public
      table: bicycle_ways
      srid: 4326
      geometry_column: geom
      geometry_type: LINESTRING
      id_column: osm_id
      minzoom: 9
      maxzoom: 16
      properties:
        name: name
        infra_type: infra_type
        highway: highway
        cycleway: cycleway
        cycleway_left: cycleway_left
        cycleway_right: cycleway_right
        bicycle: bicycle
        surface: surface
        state: state
        oneway: oneway
        bridge: bridge
        tunnel: tunnel
      buffer: 64
      clip_geom: true

    bicycle_routes:
      schema: public
      table: bicycle_routes
      srid: 4326
      geometry_column: geom
      geometry_type: MULTILINESTRING
      id_column: osm_id
      minzoom: 5
      maxzoom: 14
      properties:
        name: name
        ref: ref
        network: network
        route_type: route_type
      buffer: 64
      clip_geom: true

    parchment_landuse:
      schema: public
      table: geo_places
      srid: 4326
      geometry_column: geom
      id_column: id
      minzoom: 10
      maxzoom: 16
      properties:
        id: id
        name: name
        geom_type: geom_type
      buffer: 64
      clip_geom: true

    transit_station_buildings:
      schema: public
      table: transit_station_buildings
      srid: 4326
      geometry_column: geom
      geometry_type: GEOMETRY
      id_column: fid
      bounds: [-84.0, 33.0, -73.0, 42.0]
      minzoom: 13
      maxzoom: 16
      properties:
        id: id
        name: name
        geom_type: geom_type
        railway: railway
        public_transport: public_transport
        building_type: building_type
        station_type: station_type
        network: network
        operator: operator
      buffer: 64
      clip_geom: true

    transit_platforms:
      schema: public
      table: transit_platforms
      srid: 4326
      geometry_column: geom
      geometry_type: GEOMETRY
      id_column: fid
      bounds: [-84.0, 33.0, -73.0, 42.0]
      minzoom: 14
      maxzoom: 16
      properties:
        id: id
        name: name
        geom_type: geom_type
        railway: railway
        public_transport: public_transport
        ref: ref
        wheelchair: wheelchair
        level: level
      buffer: 64
      clip_geom: true

    transit_entrances:
      schema: public
      table: transit_entrances
      srid: 4326
      geometry_column: centroid
      geometry_type: POINT
      id_column: fid
      bounds: [-84.0, 33.0, -73.0, 42.0]
      minzoom: 14
      maxzoom: 16
      properties:
        id: id
        name: name
        railway_type: railway_type
        entrance_type: entrance_type
        wheelchair: wheelchair
        level: level
        description: description
        ref: ref
        network: network
        operator: operator
      buffer: 64
      clip_geom: true

    transit_elevators:
      schema: public
      table: transit_elevators
      srid: 4326
      geometry_column: centroid
      geometry_type: POINT
      id_column: fid
      bounds: [-84.0, 33.0, -73.0, 42.0]
      minzoom: 15
      maxzoom: 16
      properties:
        id: id
        name: name
        level: level
        wheelchair: wheelchair
      buffer: 64
      clip_geom: true

    transit_stairs:
      schema: public
      table: transit_stairs
      srid: 4326
      geometry_column: geom
      geometry_type: GEOMETRY
      id_column: fid
      bounds: [-84.0, 33.0, -73.0, 42.0]
      minzoom: 16
      maxzoom: 16
      properties:
        id: id
        name: name
        geom_type: geom_type
        incline: incline
      buffer: 64
      clip_geom: true

    # GTFS display layer (self-hosted, replaces hosted Transitland tiles).
    # Routes drawn along their canonical shape geometry; offsets/bundling come
    # in Stage 4 (LOOM). Source view: import/create-gtfs-display-views.sql.
    transit_routes:
      schema: public
      table: transit_routes
      srid: 4326
      geometry_column: geom
      geometry_type: LINESTRING
      id_column: fid
      minzoom: 6
      maxzoom: 16
      properties:
        feed_id: feed_id
        route_id: route_id
        route_type: route_type
        route_color: route_color
        route_text_color: route_text_color
        route_short_name: route_short_name
        route_long_name: route_long_name
      buffer: 128
      clip_geom: true

    # LOOM-bundled parallel offset lines (interlined routes as separate ribbons).
    transit_lines:
      schema: public
      table: transit_lines_offset
      srid: 4326
      geometry_column: geom
      geometry_type: GEOMETRY
      id_column: fid
      minzoom: 8
      maxzoom: 16
      properties:
        feed_id: feed_id
        route_id: route_id
        route_short_name: route_short_name
        route_short_names: route_short_names
        route_type: route_type
        route_color: route_color
        slot: slot
        line_count: line_count
      buffer: 128
      clip_geom: true

    # Per-station data for the client's HTML station-label markers
    # (name + routes JSON). Rendered as DOM markers, not baked symbols.
    transit_stations:
      schema: public
      table: transit_stations
      srid: 4326
      geometry_column: geom
      geometry_type: POINT
      id_column: fid
      minzoom: 11
      maxzoom: 16
      properties:
        name: name
        route_count: route_count
        routes: routes
      buffer: 64
      clip_geom: true

    transit_stops:
      schema: public
      table: transit_stops
      srid: 4326
      geometry_column: geom
      geometry_type: POINT
      id_column: fid
      minzoom: 11
      maxzoom: 16
      properties:
        feed_id: feed_id
        stop_id: stop_id
        stop_name: stop_name
        location_type: location_type
        parent_station: parent_station
        wheelchair_boarding: wheelchair_boarding
        route_count: route_count
        route_color: route_color
        route_text_color: route_text_color
        is_rail: is_rail
      buffer: 64
      clip_geom: true
