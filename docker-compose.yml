volumes:
  barrelman-data:
  barrelman-osm-data:
  barrelman-gtfs-data:

services:
  barrelman-db:
    container_name: barrelman-db
    image: alexwohlbruck/barrelman-db:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: barrelman
      POSTGRES_USER: barrelman
      POSTGRES_PASSWORD: ${BARRELMAN_DB_PASSWORD:-barrelman}
      BARRELMAN_DATA_DIR: /data
    volumes:
      - barrelman-data:/var/lib/postgresql/data
      - barrelman-osm-data:/data
    ports:
      - "5434:5432"

  martin:
    container_name: barrelman-martin
    image: ghcr.io/maplibre/martin
    restart: unless-stopped
    command: --config /config/martin-config.yaml --webui enable-for-all
    environment:
      # statement_timeout caps tile queries — an abandoned HTTP request must
      # not keep grinding in Postgres for minutes (scoped to martin's
      # connections only; imports use their own connections).
      DATABASE_URL: postgresql://barrelman:${BARRELMAN_DB_PASSWORD:-barrelman}@barrelman-db:5432/barrelman?options=-c%20statement_timeout%3D10s
    volumes:
      - barrelman-osm-data:/data
      - ./martin-config.yaml:/config/martin-config.yaml:ro
    ports:
      - "5002:3000"
    depends_on:
      - barrelman-db

  graphhopper:
    container_name: barrelman-graphhopper
    image: israelhikingmap/graphhopper:latest
    restart: unless-stopped
    # -i and -o must be passed explicitly; the entrypoint script defaults
    # graph.location to /data/default-gh otherwise, ignoring our config value.
    command: ["-i", "/data/region.osm.pbf", "-o", "/data/graph-cache"]
    environment:
      JAVA_OPTS: "${GRAPHHOPPER_JAVA_OPTS:--Xmx6g -Xms1g}"
    volumes:
      - barrelman-osm-data:/data
      - ./graphhopper-config.yml:/graphhopper/config-example.yml:ro
      - ./custom_models:/graphhopper/custom_models:ro
    ports:
      - "8989:8989"
    depends_on:
      - barrelman-db

  motis:
    container_name: barrelman-motis
    image: ghcr.io/motis-project/motis:latest
    restart: unless-stopped
    working_dir: /data
    command: ["/motis", "server", "/data"]
    volumes:
      - barrelman-gtfs-data:/data
      - barrelman-osm-data:/osm-data:ro
    ports:
      - "8080:8080"

  barrelman:
    container_name: barrelman
    image: alexwohlbruck/barrelman:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://barrelman:${BARRELMAN_DB_PASSWORD:-barrelman}@barrelman-db:5432/barrelman
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      PORT: 5001
      BARRELMAN_API_KEY: ${BARRELMAN_API_KEY:-brm_dev_changeme}
      # BARRELMAN_TILE_KEY: Set in .env for production. When unset, tile access is open (dev mode).
      BARRELMAN_TILE_KEY: ${BARRELMAN_TILE_KEY:-}
      GRAPHHOPPER_URL: http://barrelman-graphhopper:8989
      MOTIS_URL: http://barrelman-motis:8080
      # GTFS-RT poll interval baked into motis/config.yml at import time. Unset →
      # MOTIS default 60s. Set in .env (e.g. 600) to throttle dev polling.
      MOTIS_RT_UPDATE_INTERVAL: ${MOTIS_RT_UPDATE_INTERVAL:-}
      GTFS_DATA_DIR: /gtfs-zips
      # Fully preprocessed zips (what MOTIS ingests), synced into the
      # barrelman-gtfs-data volume by scripts/rebuild-motis.sh.
      GTFS_PROCESSED_DIR: /gtfs-data/gtfs
    ports:
      - "5001:5001"
    volumes:
      - barrelman-osm-data:/data
      - barrelman-gtfs-data:/gtfs-data
      - ./data/gtfs:/gtfs-zips:ro
    depends_on:
      - barrelman-db
