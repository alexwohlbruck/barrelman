name: barrelman

networks:
  default:
    external: true
    name: parchment-network

volumes:
  barrelman-pg-data:
  barrelman-osm-data:
  ollama-data:
  graphhopper-data:

services:
  barrelman-db:
    container_name: barrelman-db
    image: alexwohlbruck/barrelman-db:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: barrelman
      POSTGRES_USER: barrelman
      POSTGRES_PASSWORD: ${BARRELMAN_DB_PASSWORD:-barrelman}
      BARRELMAN_DATA_DIR: /data
    volumes:
      - barrelman-pg-data:/var/lib/postgresql/data
      - barrelman-osm-data:/data
    ports:
      - "5433:5432"

  ollama:
    container_name: barrelman-ollama
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    # Uncomment for GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  martin:
    container_name: barrelman-martin
    image: alexwohlbruck/barrelman-martin:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://barrelman:${BARRELMAN_DB_PASSWORD:-barrelman}@barrelman-db:5432/barrelman
    ports:
      - "3002:3000"
    depends_on:
      - barrelman-db

  graphhopper:
    container_name: barrelman-graphhopper
    image: alexwohlbruck/barrelman-graphhopper:latest
    restart: unless-stopped
    environment:
      JAVA_OPTS: "-Xmx2g -Xms512m"
    volumes:
      - barrelman-osm-data:/data
      - graphhopper-data:/graphhopper/graph-cache
    ports:
      - "8990:8989"

  barrelman:
    container_name: barrelman
    image: alexwohlbruck/barrelman:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://barrelman:${BARRELMAN_DB_PASSWORD:-barrelman}@barrelman-db:5432/barrelman
      OLLAMA_HOST: http://barrelman-ollama:11434
      PORT: 3001
      BARRELMAN_API_KEY: ${BARRELMAN_API_KEY:-brm_dev_changeme}
    ports:
      - "3001:3001"
    volumes:
      - barrelman-osm-data:/data
    depends_on:
      - barrelman-db
      - ollama
