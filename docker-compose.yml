volumes:
  barrelman-data:
  barrelman-osm-data:
  graphhopper-data:

services:
  barrelman-db:
    container_name: barrelman-db
    image: alexwohlbruck/barrelman-db:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: barrelman
      POSTGRES_USER: barrelman
      POSTGRES_PASSWORD: ${BARRELMAN_DB_PASSWORD:-barrelman}
      BARRELMAN_DATA_DIR: /data
    volumes:
      - barrelman-data:/var/lib/postgresql/data
      - barrelman-osm-data:/data
    ports:
      - "5434:5432"

  martin:
    container_name: barrelman-martin
    image: ghcr.io/maplibre/martin
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://barrelman:${BARRELMAN_DB_PASSWORD:-barrelman}@barrelman-db:5432/barrelman
    ports:
      - "3002:3000"
    depends_on:
      - barrelman-db

  graphhopper:
    container_name: barrelman-graphhopper
    image: israelhikingmap/graphhopper:latest
    restart: unless-stopped
    # graphhopper.sh defaults GRAPH=/data/default-gh and only sets datareader.file
    # when -i is passed, so we explicitly pass both to match our volume mounts.
    command: ["-i", "/data/region.osm.pbf", "-o", "/graphhopper/graph-cache"]
    environment:
      JAVA_OPTS: "-Xmx2g -Xms512m"
    volumes:
      - barrelman-osm-data:/data
      - graphhopper-data:/graphhopper/graph-cache
    ports:
      - "8990:8989"

  barrelman:
    container_name: barrelman
    image: alexwohlbruck/barrelman:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://barrelman:${BARRELMAN_DB_PASSWORD:-barrelman}@barrelman-db:5432/barrelman
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      PORT: 3001
      BARRELMAN_API_KEY: ${BARRELMAN_API_KEY:-brm_dev_changeme}
    ports:
      - "3001:3001"
    volumes:
      - barrelman-osm-data:/data
    depends_on:
      - barrelman-db
