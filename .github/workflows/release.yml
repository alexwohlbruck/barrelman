# CI/CD pipeline for Barrelman
#
# Triggers on every push to main:
#   1. Runs tests
#   2. Builds and pushes Docker images to Docker Hub (tagged :latest + :<sha>)
#   3. SSHes into homelab and pulls new images, restarts affected containers
#
# Required GitHub secrets:
#   DOCKERHUB_USERNAME  - Docker Hub username (e.g. alexwohlbruck)
#   DOCKERHUB_TOKEN     - Docker Hub access token (hub.docker.com → Account → Security → Access Tokens)
#   DEPLOY_HOST         - Homelab hostname or IP (e.g. wohlbruck.dev)
#   DEPLOY_USER         - SSH username on homelab (e.g. alex)
#   DEPLOY_SSH_KEY      - Private key for SSH (contents of ~/.ssh/id_ed25519)

name: Release

on:
  push:
    branches: [main]

env:
  REGISTRY: docker.io

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  build-and-push:
    name: Build and push Docker images
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push barrelman API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            alexwohlbruck/barrelman:${{ github.sha }}
            alexwohlbruck/barrelman:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push barrelman-db
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.db
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            alexwohlbruck/barrelman-db:${{ github.sha }}
            alexwohlbruck/barrelman-db:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to homelab
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/barrelman
            git pull --ff-only
            docker compose pull barrelman barrelman-db
            docker compose up -d barrelman barrelman-db
            echo "Deploy complete: $(date)"
