# MOTIS transit-only configuration
#
# Generated by: motis config gtfs/*.zip
# Runs without street routing — all pedestrian/cycling routing
# is handled by GraphHopper. MOTIS only loads GTFS data and runs
# RAPTOR for stop-to-stop transit routing.

timetable:
  first_day: TODAY
  num_days: 365
  with_shapes: true
  adjust_footpaths: true
  max_footpath_length: 15
  datasets:
    17:
      path: gtfs/17.zip
    74:
      path: gtfs/74.zip
    86:
      path: gtfs/86.zip
    87:
      path: gtfs/87.zip
    89:
      path: gtfs/89.zip

street_routing: false
osr_footpath: false
geocoding: false
reverse_geocoding: false
